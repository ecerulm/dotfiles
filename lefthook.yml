# Lefthook configuration — replaces .pre-commit-config.yaml
# Run all checks manually:  lefthook run pre-commit --all-files
# Install hooks:            lefthook install
#
# Notes:
#   - {staged_files} expands to staged files matching `glob`/`exclude`.
#   - For --all-files runs, we additionally skip symlinks and legacy dirs in
#     each command (sed/shfmt/stylua choke on symlinks pointing outside the
#     repo or on archived broken sources).

pre-commit:
  parallel: true
  commands:
    stylua:
      glob: "*.lua"
      exclude:
        - "neovim_old/**"
      # --verify: re-parse formatted output and compare ASTs to catch
      # formatter-introduced semantic drift.
      run: stylua --verify {staged_files}
      stage_fixed: true

    mdformat:
      glob: "*.md"
      # CLAUDE.md / GEMINI.md are symlinks to AGENTS.md.
      exclude:
        - "CLAUDE.md"
        - "GEMINI.md"
        - "**/CLAUDE.md"
        - "**/GEMINI.md"
      # --number: enforce consecutive ordered-list numbering.
      # --end-of-line lf: reject CRLF.
      # --wrap keep: don't reflow paragraphs (preserve author intent).
      run: mdformat --number --end-of-line lf --wrap keep {staged_files}
      stage_fixed: true

    shfmt:
      glob: "*.sh"
      # -i 2: 2-space indent, -bn: binary ops at start of next line,
      # -ci: switch case indent, -sr: redirect operators followed by space,
      # -s: simplify expressions where safe.
      run: shfmt -w -s -i 2 -bn -ci -sr {staged_files}
      stage_fixed: true

    shellcheck:
      glob: "*.sh"
      # Strict: --severity=style catches every level (style/info/warning/error)
      # and --enable=all turns on every optional check. .shellcheckrc carries
      # per-rule disables for known-acceptable patterns.
      run: shellcheck --severity=style --enable=all --external-sources {staged_files}

    check-yaml:
      glob: "*.{yml,yaml}"
      # yq exits non-zero if a document fails to parse.
      run: |
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          yq eval-all 'true' "$f" >/dev/null || exit 1
        done

    check-gitconfig:
      # Match .gitconfig, .gitconfig_osx, .gitconfig_linux, .gitconfig.thismachine, etc.
      glob: ".gitconfig*"
      # `git config --file F --list` parses the file using git's own parser
      # (handles [section "subsection"], includes, multi-valued keys) and exits
      # non-zero on syntax errors. No mainstream formatter exists for gitconfig;
      # this catches the realistic failure mode (typo breaks the whole file).
      run: |
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          [ -L "$f" ] && continue
          git config --file "$f" --list >/dev/null || exit 1
        done

    check-merge-conflict:
      run: |
        # `git diff --check` flags conflict markers in the index.
        git diff --cached --check

    check-added-large-files:
      # Fail if any staged file exceeds 500 KB (matches pre-commit's default).
      run: |
        max=$((500 * 1024))
        status=0
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          [ -L "$f" ] && continue
          size=$(wc -c < "$f")
          if [ "$size" -gt "$max" ]; then
            echo "lefthook: $f is ${size} bytes (>${max})" >&2
            status=1
          fi
        done
        exit $status

    trailing-whitespace:
      exclude:
        - "*.png"
        - "*.jpg"
        - "*.jpeg"
        - "*.gif"
        - "*.ico"
        - "*.pdf"
        - "*.ttf"
        - "*.otf"
        - "*.woff"
        - "*.woff2"
      run: |
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          [ -L "$f" ] && continue
          # Portable in-place edit (BSD + GNU sed)
          sed -i '' -e 's/[[:space:]]\{1,\}$//' "$f" 2>/dev/null \
            || sed -i -e 's/[[:space:]]\{1,\}$//' "$f"
        done
      stage_fixed: true

    end-of-file-fixer:
      exclude:
        - "*.png"
        - "*.jpg"
        - "*.jpeg"
        - "*.gif"
        - "*.ico"
        - "*.pdf"
        - "*.ttf"
        - "*.otf"
        - "*.woff"
        - "*.woff2"
      run: |
        for f in {staged_files}; do
          [ -f "$f" ] || continue
          [ -L "$f" ] && continue
          # Append trailing newline if missing
          if [ -n "$(tail -c1 "$f")" ]; then
            printf '\n' >> "$f"
          fi
        done
      stage_fixed: true
